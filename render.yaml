services:
  # PostgreSQL Database
  - type: pserv
    name: healthcare-db
    env: docker
    plan: free

  # Streamlit Dashboard
  - type: web
    name: healthcare-dashboard
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run dashboard/app.py --server.port=$PORT --server.address=0.0.0.0"
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: healthcare-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: healthcare-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: healthcare-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: healthcare-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: healthcare-db
          property: password
